<!DOCTYPE html>
<html lang="pt-br" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Contato - Pocket Gamer</title>

    <link rel="stylesheet" href="css/master.css">

  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <img class="logo" src="img/logo.png" alt="Logo">
        <li><a href="contact.html">Contato</a></li>
      </ul>
    </nav>
    <section class="container form-container">
      <form class="" action="index.html" method="post">
        <input type="text" name="name" placeholder="Nome">
        <input type="text" name="last_name" placeholder="Sobrenome">
        <input type="email" name="name" placeholder="E-mail">
        <input type="email" name="phone" placeholder="Telefone">
        <input type="text" name="address" placeholder="Endereço">
        <select class="" name="city">
          <option value="sp">São Paulo</option>
          <option value="rp">Ribeirão Preto</option>
        </select>
        <input type="text" name="uf" placeholder="UF">
        <div class="radio-inputs">
          Sexo:
          <input type="radio" name="sex" value="m"> Masculino
          <input type="radio" name="sex" value="f"> Feminino
          <input type="radio" name="sex" value="o"> Outro
        </div>
        <input type="text" name="subject" placeholder="Assunto">
        <textarea name="message" placeholder="Mensagem"></textarea>
        <input class="submit" type="submit" name="" value="Enviar">
      </form>
    </section>
    <footer>
      <div class="container">
        <p>Copyright - 2020 | Todos os direitos reservados.</p>
      </div>
    </footer>
  </body>
</html>
